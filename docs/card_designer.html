<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Card Designer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#111;--panel:#1a1a1f;--panel2:#222228;--border:#2a2a32;--text:#e0e0e0;--text2:#888;--accent:#f05a28;--accent2:#ff8a5c}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden}
/* SIDEBAR */
#sidebar{width:280px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto}
.panel-header{padding:16px;border-bottom:1px solid var(--border);font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:13px;text-transform:uppercase;letter-spacing:1.5px;color:var(--accent);display:flex;align-items:center;justify-content:space-between}
.panel-section{padding:14px 16px;border-bottom:1px solid var(--border)}
.panel-section label{display:block;font-size:11px;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.8px}
.panel-section input[type="text"],.panel-section input[type="number"],.panel-section select,.panel-section textarea{width:100%;background:var(--panel2);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:6px;font-size:13px;font-family:inherit;outline:none}
.panel-section input:focus,.panel-section select:focus,.panel-section textarea:focus{border-color:var(--accent)}
.panel-section textarea{resize:vertical;min-height:50px}
.color-row{display:flex;gap:8px;align-items:center}
.color-row input[type="color"]{width:36px;height:36px;border:none;background:none;cursor:pointer;border-radius:6px}
.color-row input[type="text"]{flex:1}
.row2{display:flex;gap:8px}
.row2>div{flex:1}
.btn{padding:8px 14px;border:none;border-radius:6px;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;transition:.2s}
.btn-accent{background:var(--accent);color:#fff}
.btn-accent:hover{background:var(--accent2)}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-outline:hover{border-color:var(--accent);color:var(--accent)}
.btn-danger{background:#c0392b;color:#fff}
.btn-danger:hover{background:#e74c3c}
.btn-full{width:100%}
.btn-row{display:flex;gap:6px;margin-top:8px}
/* LAYERS */
.layer-item{padding:8px 10px;background:var(--panel2);border:1px solid transparent;border-radius:6px;margin-bottom:4px;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:space-between;transition:.15s}
.layer-item:hover{border-color:var(--border)}
.layer-item.active{border-color:var(--accent);background:rgba(240,90,40,.08)}
.layer-item span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px}
/* CANVAS AREA */
#canvas-area{flex:1;display:flex;align-items:center;justify-content:center;background:#0a0a0a;position:relative;overflow:auto}
#canvas-wrap{position:relative;box-shadow:0 20px 60px rgba(0,0,0,.6)}
#card-canvas{position:relative;overflow:hidden;background:#1e1e24}
.card-bg{position:absolute;inset:0;background-size:cover;background-position:center}
.card-overlay{position:absolute;inset:0}
.text-el{position:absolute;cursor:move;user-select:none;white-space:pre-wrap;outline:none;min-width:20px;min-height:16px;border:2px solid transparent;transition:border-color .15s}
.text-el:hover{border-color:rgba(240,90,40,.4)}
.text-el.selected{border-color:var(--accent)}
.text-el.editing{cursor:text;border-color:var(--accent2)}
/* RESIZE HANDLE */
.resize-handle{position:absolute;bottom:-5px;right:-5px;width:10px;height:10px;background:var(--accent);border-radius:2px;cursor:nwse-resize;display:none}
.text-el.selected .resize-handle{display:block}
/* TOP BAR */
#topbar{position:absolute;top:0;left:280px;right:0;height:48px;background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:10px;z-index:50}
#topbar .logo{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;color:var(--accent);margin-right:auto}
.canvas-size-inputs{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--text2)}
.canvas-size-inputs input{width:60px;background:var(--panel2);border:1px solid var(--border);color:var(--text);padding:4px 8px;border-radius:4px;font-size:12px;text-align:center}
#no-selection-msg{padding:20px 16px;color:var(--text2);font-size:12px;text-align:center;line-height:1.6}
</style>
</head>
<body>

<!-- SIDEBAR -->
<div id="sidebar">
  <div class="panel-header">Layers <button class="btn btn-accent" onclick="addText()" style="padding:4px 10px;font-size:11px">+ Text</button></div>
  <div id="layers-list" style="padding:8px 10px;max-height:200px;overflow-y:auto"></div>

  <div class="panel-header">Background</div>
  <div class="panel-section">
    <label>Image</label>
    <input type="file" id="bg-upload" accept="image/*" style="font-size:11px;color:var(--text2)" onchange="changeBg(event)">
    <div class="btn-row">
      <button class="btn btn-outline btn-full" onclick="removeBg()">Remove BG</button>
    </div>
  </div>
  <div class="panel-section">
    <label>Overlay Color</label>
    <div class="color-row">
      <input type="color" id="overlay-color" value="#1a1a20" oninput="updateOverlay()">
      <input type="text" id="overlay-hex" value="#1a1a20" oninput="syncOverlayFromHex()">
    </div>
    <label style="margin-top:8px">Direction</label>
    <select id="overlay-dir" onchange="updateOverlay()">
      <option value="to right" selected>Left → Right</option>
      <option value="to left">Right → Left</option>
      <option value="to bottom">Top → Bottom</option>
      <option value="to top">Bottom → Top</option>
      <option value="to bottom right">TopLeft → BottomRight</option>
      <option value="to bottom left">TopRight → BottomLeft</option>
    </select>
    <label style="margin-top:8px">Start Opacity</label>
    <input type="range" id="overlay-op-start" min="0" max="100" value="95" style="width:100%" oninput="updateOverlay()">
    <label style="margin-top:6px">End Opacity</label>
    <input type="range" id="overlay-op-end" min="0" max="100" value="10" style="width:100%" oninput="updateOverlay()">
    <label style="margin-top:6px">Gradient Midpoint (%)</label>
    <input type="range" id="overlay-mid" min="10" max="90" value="60" style="width:100%" oninput="updateOverlay()">
  </div>
  <div class="panel-section">
    <label>Card Background</label>
    <div class="color-row">
      <input type="color" id="card-bg-color" value="#1e1e24" oninput="updateCardBg()">
      <input type="text" id="card-bg-hex" value="#1e1e24" oninput="syncCardBgHex()">
    </div>
  </div>

  <div class="panel-header">Properties</div>
  <div id="props-panel">
    <div id="no-selection-msg">Click a text element to edit its properties</div>
    <div id="props-fields" style="display:none">
      <div class="panel-section">
        <label>Content</label>
        <textarea id="p-content" oninput="updateProp('content')"></textarea>
      </div>
      <div class="panel-section">
        <label>Font Family</label>
        <select id="p-font" onchange="updateProp('font')">
          <option value="'DM Sans',sans-serif">DM Sans</option>
          <option value="'Space Grotesk',sans-serif">Space Grotesk</option>
          <option value="'Syne',sans-serif">Syne</option>
          <option value="'Georgia',serif">Georgia</option>
          <option value="'Courier New',monospace">Courier New</option>
          <option value="Arial,sans-serif">Arial</option>
          <option value="'Impact',sans-serif">Impact</option>
        </select>
      </div>
      <div class="panel-section">
        <div class="row2">
          <div><label>Size (px)</label><input type="number" id="p-size" min="8" max="200" oninput="updateProp('size')"></div>
          <div><label>Weight</label>
            <select id="p-weight" onchange="updateProp('weight')">
              <option value="400">Regular</option>
              <option value="500">Medium</option>
              <option value="700">Bold</option>
              <option value="800">Extra Bold</option>
            </select>
          </div>
        </div>
      </div>
      <div class="panel-section">
        <label>Color</label>
        <div class="color-row">
          <input type="color" id="p-color" oninput="updateProp('color')">
          <input type="text" id="p-color-hex" oninput="updatePropHex()">
        </div>
      </div>
      <div class="panel-section">
        <label>Background</label>
        <div class="color-row">
          <input type="color" id="p-bg" oninput="updateProp('bg')">
          <input type="text" id="p-bg-hex" oninput="updatePropBgHex()">
        </div>
        <label style="margin-top:6px">BG Opacity</label>
        <input type="range" id="p-bg-opacity" min="0" max="100" value="0" style="width:100%" oninput="updateProp('bgOpacity')">
        <label style="margin-top:6px">BG Padding (px)</label>
        <input type="number" id="p-bg-pad" value="0" min="0" max="40" oninput="updateProp('bgPad')">
        <label style="margin-top:6px">BG Radius (px)</label>
        <input type="number" id="p-bg-rad" value="0" min="0" max="40" oninput="updateProp('bgRad')">
      </div>
      <div class="panel-section">
        <div class="row2">
          <div><label>X</label><input type="number" id="p-x" oninput="updateProp('x')"></div>
          <div><label>Y</label><input type="number" id="p-y" oninput="updateProp('y')"></div>
        </div>
      </div>
      <div class="panel-section">
        <label>Letter Spacing (px)</label>
        <input type="number" id="p-ls" value="0" step="0.5" oninput="updateProp('ls')">
        <label style="margin-top:6px">Line Height</label>
        <input type="number" id="p-lh" value="1.2" step="0.1" min="0.5" max="3" oninput="updateProp('lh')">
      </div>
      <div class="panel-section">
        <button class="btn btn-danger btn-full" onclick="deleteSelected()">Delete Element</button>
      </div>
    </div>
  </div>
</div>

<!-- TOPBAR -->
<div id="topbar">
  <div class="logo">Card Designer</div>
  <div class="canvas-size-inputs">
    <span>W</span><input type="number" id="c-width" value="600" onchange="resizeCanvas()">
    <span>H</span><input type="number" id="c-height" value="400" onchange="resizeCanvas()">
  </div>
  <button class="btn btn-outline" onclick="exportPNG()">Export PNG</button>
  <button class="btn btn-accent" onclick="exportPNG(2)">Export 2x</button>
</div>

<!-- CANVAS -->
<div id="canvas-area" style="padding-top:48px">
  <div id="canvas-wrap">
    <div id="card-canvas" style="width:600px;height:400px">
      <div class="card-bg" id="card-bg"></div>
      <div class="card-overlay" id="card-overlay" style="background:linear-gradient(to right,rgba(26,26,32,0.95) 0%,rgba(26,26,32,0.76) 60%,rgba(26,26,32,0.1) 100%)"></div>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('card-canvas');
const layersList = document.getElementById('layers-list');
let elements = [];
let selectedId = null;
let idCounter = 0;
let dragState = null;

// --- ELEMENT MANAGEMENT ---
function addText(text='New Text', opts={}){
  const id = ++idCounter;
  const el = {
    id, text,
    x: opts.x||40, y: opts.y||40,
    font: opts.font||"'Syne',sans-serif",
    size: opts.size||36, weight: opts.weight||'700',
    color: opts.color||'#ffffff',
    bg: opts.bg||'#000000', bgOpacity: opts.bgOpacity||0,
    bgPad: opts.bgPad||0, bgRad: opts.bgRad||0,
    ls: opts.ls||0, lh: opts.lh||1.2
  };
  elements.push(el);
  renderAll();
  selectEl(id);
  return id;
}

function renderAll(){
  // Keep bg and overlay, remove text els
  canvas.querySelectorAll('.text-el').forEach(e=>e.remove());
  elements.forEach(el=>{
    const div = document.createElement('div');
    div.className = 'text-el' + (el.id===selectedId?' selected':'');
    div.dataset.id = el.id;
    div.style.left = el.x+'px';
    div.style.top = el.y+'px';
    div.style.fontFamily = el.font;
    div.style.fontSize = el.size+'px';
    div.style.fontWeight = el.weight;
    div.style.color = el.color;
    div.style.letterSpacing = el.ls+'px';
    div.style.lineHeight = el.lh;
    if(el.bgOpacity>0){
      const c = hexToRgb(el.bg);
      div.style.backgroundColor = `rgba(${c.r},${c.g},${c.b},${el.bgOpacity/100})`;
      div.style.padding = el.bgPad+'px';
      div.style.borderRadius = el.bgRad+'px';
    }
    div.textContent = el.text;
    // resize handle
    const rh = document.createElement('div');
    rh.className='resize-handle';
    rh.addEventListener('mousedown', e=>startResize(e, el.id));
    div.appendChild(rh);
    // events
    div.addEventListener('mousedown', e=>{
      if(e.target.classList.contains('resize-handle')) return;
      selectEl(el.id);
      startDrag(e, el.id);
    });
    div.addEventListener('dblclick', ()=>startEditing(el.id));
    canvas.appendChild(div);
  });
  renderLayers();
}

function renderLayers(){
  layersList.innerHTML='';
  [...elements].reverse().forEach(el=>{
    const d = document.createElement('div');
    d.className='layer-item'+(el.id===selectedId?' active':'');
    d.innerHTML=`<span>${el.text.substring(0,25)}</span><span style="font-size:10px;color:var(--text2)">${el.size}px</span>`;
    d.onclick=()=>selectEl(el.id);
    layersList.appendChild(d);
  });
}

function selectEl(id){
  selectedId = id;
  renderAll();
  showProps();
}

function showProps(){
  const el = elements.find(e=>e.id===selectedId);
  if(!el){
    document.getElementById('props-fields').style.display='none';
    document.getElementById('no-selection-msg').style.display='block';
    return;
  }
  document.getElementById('props-fields').style.display='block';
  document.getElementById('no-selection-msg').style.display='none';
  document.getElementById('p-content').value = el.text;
  document.getElementById('p-font').value = el.font;
  document.getElementById('p-size').value = el.size;
  document.getElementById('p-weight').value = el.weight;
  document.getElementById('p-color').value = el.color;
  document.getElementById('p-color-hex').value = el.color;
  document.getElementById('p-bg').value = el.bg;
  document.getElementById('p-bg-hex').value = el.bg;
  document.getElementById('p-bg-opacity').value = el.bgOpacity;
  document.getElementById('p-bg-pad').value = el.bgPad;
  document.getElementById('p-bg-rad').value = el.bgRad;
  document.getElementById('p-x').value = Math.round(el.x);
  document.getElementById('p-y').value = Math.round(el.y);
  document.getElementById('p-ls').value = el.ls;
  document.getElementById('p-lh').value = el.lh;
}

function updateProp(prop){
  const el = elements.find(e=>e.id===selectedId);
  if(!el) return;
  switch(prop){
    case 'content': el.text=document.getElementById('p-content').value; break;
    case 'font': el.font=document.getElementById('p-font').value; break;
    case 'size': el.size=parseInt(document.getElementById('p-size').value)||12; break;
    case 'weight': el.weight=document.getElementById('p-weight').value; break;
    case 'color': el.color=document.getElementById('p-color').value; document.getElementById('p-color-hex').value=el.color; break;
    case 'bg': el.bg=document.getElementById('p-bg').value; document.getElementById('p-bg-hex').value=el.bg; break;
    case 'bgOpacity': el.bgOpacity=parseInt(document.getElementById('p-bg-opacity').value); break;
    case 'bgPad': el.bgPad=parseInt(document.getElementById('p-bg-pad').value)||0; break;
    case 'bgRad': el.bgRad=parseInt(document.getElementById('p-bg-rad').value)||0; break;
    case 'x': el.x=parseInt(document.getElementById('p-x').value)||0; break;
    case 'y': el.y=parseInt(document.getElementById('p-y').value)||0; break;
    case 'ls': el.ls=parseFloat(document.getElementById('p-ls').value)||0; break;
    case 'lh': el.lh=parseFloat(document.getElementById('p-lh').value)||1.2; break;
  }
  renderAll();
}
function updatePropHex(){
  const el=elements.find(e=>e.id===selectedId); if(!el) return;
  const v=document.getElementById('p-color-hex').value;
  if(/^#[0-9a-fA-F]{6}$/.test(v)){el.color=v;document.getElementById('p-color').value=v;renderAll();}
}
function updatePropBgHex(){
  const el=elements.find(e=>e.id===selectedId); if(!el) return;
  const v=document.getElementById('p-bg-hex').value;
  if(/^#[0-9a-fA-F]{6}$/.test(v)){el.bg=v;document.getElementById('p-bg').value=v;renderAll();}
}

function deleteSelected(){
  elements = elements.filter(e=>e.id!==selectedId);
  selectedId=null;
  renderAll(); showProps();
}

// --- DRAG ---
function startDrag(e, id){
  const el = elements.find(x=>x.id===id);
  dragState = {id, startX:e.clientX, startY:e.clientY, origX:el.x, origY:el.y, type:'move'};
  e.preventDefault();
}
function startResize(e, id){
  const el = elements.find(x=>x.id===id);
  dragState = {id, startX:e.clientX, startY:e.clientY, origSize:el.size, type:'resize'};
  e.preventDefault(); e.stopPropagation();
}
document.addEventListener('mousemove', e=>{
  if(!dragState) return;
  const dx=e.clientX-dragState.startX, dy=e.clientY-dragState.startY;
  const el=elements.find(x=>x.id===dragState.id);
  if(!el) return;
  if(dragState.type==='move'){
    el.x=dragState.origX+dx; el.y=dragState.origY+dy;
  } else {
    el.size = Math.max(8, dragState.origSize + Math.round((dx+dy)/3));
  }
  renderAll();
});
document.addEventListener('mouseup', ()=>{
  if(dragState){ showProps(); dragState=null; }
});

// --- INLINE EDITING ---
function startEditing(id){
  const dom = canvas.querySelector(`[data-id="${id}"]`);
  if(!dom) return;
  dom.contentEditable = true;
  dom.classList.add('editing');
  dom.focus();
  // select all text
  const range = document.createRange();
  range.selectNodeContents(dom);
  const sel = window.getSelection();
  sel.removeAllRanges(); sel.addRange(range);

  const finish = ()=>{
    dom.contentEditable = false;
    dom.classList.remove('editing');
    const el = elements.find(e=>e.id===id);
    if(el) el.text = dom.textContent;
    renderAll(); showProps();
  };
  dom.addEventListener('blur', finish, {once:true});
  dom.addEventListener('keydown', e=>{
    if(e.key==='Escape'||e.key==='Enter'&&!e.shiftKey){e.preventDefault();dom.blur();}
  });
}

// --- BACKGROUND ---
function changeBg(e){
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ev=>{
    document.getElementById('card-bg').style.backgroundImage=`url(${ev.target.result})`;
  };
  reader.readAsDataURL(file);
}
function removeBg(){
  document.getElementById('card-bg').style.backgroundImage='none';
  document.getElementById('bg-upload').value='';
}
function updateOverlay(){
  const c=document.getElementById('overlay-color').value;
  const dir=document.getElementById('overlay-dir').value;
  const opStart=document.getElementById('overlay-op-start').value/100;
  const opEnd=document.getElementById('overlay-op-end').value/100;
  const mid=document.getElementById('overlay-mid').value;
  document.getElementById('overlay-hex').value=c;
  const rgb=hexToRgb(c);
  document.getElementById('card-overlay').style.background=
    `linear-gradient(${dir}, rgba(${rgb.r},${rgb.g},${rgb.b},${opStart}) 0%, rgba(${rgb.r},${rgb.g},${rgb.b},${opStart*0.8}) ${mid}%, rgba(${rgb.r},${rgb.g},${rgb.b},${opEnd}) 100%)`;
}
function syncOverlayFromHex(){
  const v=document.getElementById('overlay-hex').value;
  if(/^#[0-9a-fA-F]{6}$/.test(v)){document.getElementById('overlay-color').value=v;updateOverlay();}
}
function updateCardBg(){
  const c=document.getElementById('card-bg-color').value;
  document.getElementById('card-bg-hex').value=c;
  canvas.style.backgroundColor=c;
}
function syncCardBgHex(){
  const v=document.getElementById('card-bg-hex').value;
  if(/^#[0-9a-fA-F]{6}$/.test(v)){document.getElementById('card-bg-color').value=v;updateCardBg();}
}
function resizeCanvas(){
  const w=parseInt(document.getElementById('c-width').value)||600;
  const h=parseInt(document.getElementById('c-height').value)||400;
  canvas.style.width=w+'px'; canvas.style.height=h+'px';
}

// --- EXPORT ---
function exportPNG(scale=1){
  // hide selection borders
  const prev = selectedId; selectedId=null; renderAll();
  
  import('https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.esm.js').then(mod=>{
    const html2canvas = mod.default;
    html2canvas(canvas, {scale, useCORS:true, backgroundColor:null}).then(c=>{
      const a=document.createElement('a');
      a.download='card-design.png';
      a.href=c.toDataURL('image/png');
      a.click();
      selectedId=prev; renderAll();
    });
  }).catch(()=>{
    // fallback: use script tag
    if(!window._h2cLoaded){
      const s=document.createElement('script');
      s.src='https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
      s.onload=()=>{window._h2cLoaded=true; doExport(scale,prev);};
      document.head.appendChild(s);
    } else doExport(scale,prev);
  });
}
function doExport(scale,prev){
  html2canvas(canvas,{scale,useCORS:true,backgroundColor:null}).then(c=>{
    const a=document.createElement('a');
    a.download='card-design.png';
    a.href=c.toDataURL('image/png');
    a.click();
    selectedId=prev; renderAll();
  });
}

// --- DESELECT ON CANVAS CLICK ---
canvas.addEventListener('mousedown', e=>{
  if(e.target===canvas||e.target.classList.contains('card-bg')||e.target.classList.contains('card-overlay')){
    selectedId=null; renderAll(); showProps();
  }
});

// --- UTILS ---
function hexToRgb(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return {r,g,b};
}
